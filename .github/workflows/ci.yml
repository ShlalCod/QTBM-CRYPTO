# =================================================================
# QTBM CRYPTO — CI Quality Check
# =================================================================
# Runs on every push and PR. Lints the codebase and verifies that
# the Next.js production build succeeds (static export).
# =================================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Static Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: 🔍 Generate Prisma client
        run: bun run db:generate || true

      - name: 🧹 Lint
        run: bun run lint || true

      - name: 🏗️ Build (static export)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: ✅ Verify static export
        run: |
          if [ ! -f out/index.html ]; then
            echo "✗ Build failed: out/index.html not found"
            exit 1
          fi
          echo "✓ out/index.html exists ($(wc -c < out/index.html) bytes)"
