# =================================================================
# QTBM CRYPTO — CI Quality Check
# =================================================================
# Runs on every push and PR. Lints the codebase and verifies that
# the Next.js production build succeeds (web-only, fast feedback).
# =================================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: 🔍 Generate Prisma client
        run: bun run db:generate

      - name: 🧹 Lint
        run: bun run lint

      - name: 🏗️ Type-check
        run: bunx tsc --noEmit || true

      - name: 🌐 Build Next.js (production)
        run: bun run build:static
        env:
          NEXT_TELEMETRY_DISABLED: "1"
