# =================================================================
# QTBM CRYPTO — APK Build (GitHub Actions)
# =================================================================
# Builds a signed release APK on every push / tag.
# The APK is uploaded as a workflow artifact that you can download
# directly from the Actions tab on GitHub.
#
# Triggers:
#   - push to main / master
#   - manual dispatch (Actions tab → Run workflow)
#   - version tags (v*.*.*)
# =================================================================
name: Build APK

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
    paths:
      - "src/**"
      - "public/**"
      - "prisma/**"
      - "android/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "next.config.ts"
      - "capacitor.config.ts"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

# Cancel any superseded run on the same ref.
concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed for releasing on tags
      actions: read

    steps:
      # ---------- 1. Checkout ----------
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- 2. Setup Bun + Node ----------
      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install web dependencies
        run: bun install --frozen-lockfile || bun install

      # ---------- 3. Setup JDK 21 ----------
      # Capacitor 8.x requires JDK 21 to compile its Android library
      # (sourceCompatibility = 21). JDK 21 is also compatible with
      # AGP 8.5.2 and Gradle 8.7.
      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ---------- 4. Setup Android SDK ----------
      # ubuntu-latest already ships with Android SDK preinstalled. We just
      # need to accept licenses, ensure API 35 + build-tools 35.0.0 are
      # present (Capacitor 8.x requires compileSdk 35), and point env vars.
      - name: 🤖 Configure Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          # Accept all SDK licenses (idempotent)
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          # Ensure required components are present (Capacitor 8.x → API 35)
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null 2>&1 || true
          sdkmanager --list_installed | grep -E "android-35|build-tools;35" || true

      # ---------- 5. Generate release keystore (CI-only) ----------
      # In CI we use a temporary keystore. For Play Store releases,
      # store your real keystore as a repository secret and reference it here.
      # NOTE: The keystore MUST live in android/app/ because app/build.gradle's
      # signingConfigs uses file() which resolves relative to the :app module dir.
      - name: 🔑 Generate release keystore
        env:
          KS_PASS: ${{ secrets.QTBM_KEYSTORE_PASSWORD || 'qtbm-ci-keystore-2025' }}
          KEY_PASS: ${{ secrets.QTBM_KEY_PASSWORD || 'qtbm-ci-key-2025' }}
        run: |
          if [ ! -f android/app/qtbm-release.keystore ]; then
            echo "▶ Generating CI release keystore at android/app/qtbm-release.keystore…"
            keytool -genkeypair -v \
              -keystore android/app/qtbm-release.keystore \
              -alias qtbm \
              -keyalg RSA -keysize 4096 \
              -sigalg SHA256withRSA \
              -validity 10950 \
              -storepass "$KS_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=QTBM CRYPTO CI, OU=Engineering, O=QTBM, L=Sanaa, ST=Sanaa, C=YE"
          fi
          # keystore.properties sits next to build.gradle (in android/) and
          # references the keystore by filename only (relative to android/app/).
          printf 'storeFile=qtbm-release.keystore\nstorePassword=%s\nkeyAlias=qtbm\nkeyPassword=%s\n' \
            "$KS_PASS" "$KEY_PASS" > android/keystore.properties
          echo "✓ keystore.properties written (passwords redacted below):"
          cat android/keystore.properties | sed 's/password=.*/password=***/'
          echo "✓ Keystore location:"
          ls -la android/app/qtbm-release.keystore

      # ---------- 6. Build the web app ----------
      - name: 🌐 Build Next.js web app
        run: |
          bun run db:generate || true
          bun run build:static

      # ---------- 7. Capacitor sync ----------
      - name: 🔄 Capacitor sync
        run: bun run cap:sync

      # Ensure the cordova-android-plugins directory exists (Gradle flatDir
      # references it; an empty libs/ folder keeps the build happy when no
      # Cordova plugins are installed).
      - name: 📁 Ensure cordova-plugins directory
        run: mkdir -p android/capacitor-cordova-android-plugins/src/main/libs

      # ---------- 8. Build the APK with Gradle ----------
      - name: 📱 Build ${{ github.event.inputs.build_type || 'release' }} APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          cd android
          chmod +x ./gradlew || true
          # Bootstrap the gradle wrapper jar if missing — download it from
          # the official Gradle 8.7.0 GitHub release (avoids system-gradle
          # version conflicts).
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "▶ Downloading gradle-wrapper.jar (Gradle 8.7.0)…"
            mkdir -p gradle/wrapper
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
            ls -la gradle/wrapper/
          fi
          echo "--- settings.gradle ---"
          cat settings.gradle
          echo "--- gradle-wrapper.properties ---"
          cat gradle/wrapper/gradle-wrapper.properties
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --console=plain --stacktrace
          else
            ./gradlew assembleRelease --no-daemon --console=plain --stacktrace
          fi

      # ---------- 9. Locate & verify the APK ----------
      - name: 📂 Locate built APK
        id: apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_GLOB="android/app/build/outputs/apk/debug/*.apk"
          else
            APK_GLOB="android/app/build/outputs/apk/release/*.apk"
          fi
          APK_PATH=$(ls -1 $APK_GLOB 2>/dev/null | head -1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "✗ No APK found at $APK_GLOB" >&2
            exit 1
          fi
          APK_ABS="$(pwd)/$APK_PATH"
          APK_NAME=$(basename "$APK_ABS")
          APK_SIZE=$(du -h "$APK_ABS" | cut -f1)
          echo "apk_path=$APK_ABS" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✓ Built APK: $APK_NAME ($APK_SIZE)"

      # ---------- 10. Upload artifact ----------
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QTBM-CRYPTO-${{ github.event.inputs.build_type || 'release' }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 90

      # ---------- 11. Upload build reports (for debugging) ----------
      - name: 📤 Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/app/build/reports
            android/build/reports
          if-no-files-found: ignore
          retention-days: 14

      # ---------- 12. Create GitHub Release on tags ----------
      - name: 🏷 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          name: QTBM CRYPTO ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 13. Summary ----------
      - name: 📊 Build summary
        run: |
          echo "## ✅ QTBM CRYPTO APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Name | \`${{ steps.apk.outputs.apk_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | \`${{ steps.apk.outputs.apk_size }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | \`${{ github.event.inputs.build_type || 'release' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section at the bottom of this run." >> $GITHUB_STEP_SUMMARY
