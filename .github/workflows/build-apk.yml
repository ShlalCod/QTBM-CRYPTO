# =================================================================
# QTBM CRYPTO — APK Build (GitHub Actions)
# =================================================================
# Builds a signed release APK on every push / tag.
# The APK is uploaded as a workflow artifact that you can download
# directly from the Actions tab on GitHub.
#
# Triggers:
#   - push to main / master
#   - manual dispatch (Actions tab → Run workflow)
#   - version tags (v*.*.*)
# =================================================================
name: Build APK

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
    paths:
      - "src/**"
      - "public/**"
      - "prisma/**"
      - "android/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "next.config.ts"
      - "capacitor.config.ts"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

# Cancel any superseded run on the same ref.
concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed for releasing on tags
      actions: read

    steps:
      # ---------- 1. Checkout ----------
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- 2. Setup Bun + Node ----------
      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install web dependencies
        run: bun install --frozen-lockfile || bun install

      # ---------- 3. Setup JDK 17 ----------
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ---------- 4. Setup Android SDK ----------
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: 🔧 Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # ---------- 5. Generate release keystore (CI-only) ----------
      # In CI we use a temporary keystore. For Play Store releases,
      # store your real keystore as a repository secret and reference it here.
      - name: 🔑 Generate release keystore
        env:
          KS_PASS: ${{ secrets.QTBM_KEYSTORE_PASSWORD || 'qtbm-ci-keystore-2025' }}
          KEY_PASS: ${{ secrets.QTBM_KEY_PASSWORD || 'qtbm-ci-key-2025' }}
        run: |
          if [ ! -f android/qtbm-release.keystore ]; then
            echo "▶ Generating CI release keystore…"
            keytool -genkeypair -v \
              -keystore android/qtbm-release.keystore \
              -alias qtbm \
              -keyalg RSA -keysize 4096 \
              -sigalg SHA256withRSA \
              -validity 10950 \
              -storepass "$KS_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=QTBM CRYPTO CI, OU=Engineering, O=QTBM, L=Sanaa, ST=Sanaa, C=YE"
          fi
          cat > android/keystore.properties <<EOF
          storeFile=qtbm-release.keystore
          storePassword=${KS_PASS}
          keyAlias=qtbm
          keyPassword=${KEY_PASS}
          EOF
          echo "✓ keystore.properties written"

      # ---------- 6. Build the web app ----------
      - name: 🌐 Build Next.js web app
        run: |
          bun run db:generate || true
          bun run build:static

      # ---------- 7. Capacitor sync ----------
      - name: 🔄 Capacitor sync
        run: bun run cap:sync

      # ---------- 8. Build the APK with Gradle ----------
      - name: 📱 Build ${{ github.event.inputs.build_type || 'release' }} APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          cd android
          chmod +x ./gradlew || true
          # Bootstrap the gradle wrapper jar if missing (system gradle fallback)
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin || true
          fi
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --console=plain --stacktrace
          else
            ./gradlew assembleRelease --no-daemon --console=plain --stacktrace
          fi

      # ---------- 9. Locate & verify the APK ----------
      - name: 📂 Locate built APK
        id: apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_GLOB="android/app/build/outputs/apk/debug/*.apk"
          else
            APK_GLOB="android/app/build/outputs/apk/release/*.apk"
          fi
          APK_PATH=$(ls -1 $APK_GLOB 2>/dev/null | head -1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "✗ No APK found at $APK_GLOB" >&2
            exit 1
          fi
          APK_ABS="$(pwd)/$APK_PATH"
          APK_NAME=$(basename "$APK_ABS")
          APK_SIZE=$(du -h "$APK_ABS" | cut -f1)
          echo "apk_path=$APK_ABS" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✓ Built APK: $APK_NAME ($APK_SIZE)"

      # ---------- 10. Upload artifact ----------
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QTBM-CRYPTO-${{ github.event.inputs.build_type || 'release' }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 90

      # ---------- 11. Upload build reports (for debugging) ----------
      - name: 📤 Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/app/build/reports
            android/build/reports
          if-no-files-found: ignore
          retention-days: 14

      # ---------- 12. Create GitHub Release on tags ----------
      - name: 🏷 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          name: QTBM CRYPTO ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 13. Summary ----------
      - name: 📊 Build summary
        run: |
          echo "## ✅ QTBM CRYPTO APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Name | \`${{ steps.apk.outputs.apk_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | \`${{ steps.apk.outputs.apk_size }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | \`${{ github.event.inputs.build_type || 'release' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section at the bottom of this run." >> $GITHUB_STEP_SUMMARY
