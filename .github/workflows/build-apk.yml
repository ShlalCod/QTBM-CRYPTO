# =================================================================
# QTBM CRYPTO — APK Build (GitHub Actions)
# =================================================================
# Builds a signed release APK on every push to main or version tag.
# The APK is uploaded as a workflow artifact (downloadable from
# the Actions tab) and attached to a GitHub Release on tags.
#
# Triggers:
#   - push to main
#   - version tags (v*.*.*)
#   - manual dispatch (Actions tab → Run workflow)
# =================================================================
name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read

    steps:
      # ---------- 1. Checkout ----------
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4

      # ---------- 2. Setup Bun ----------
      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install web dependencies
        run: bun install --frozen-lockfile || bun install

      # ---------- 3. Setup JDK 21 ----------
      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ---------- 4. Configure Android SDK ----------
      - name: 🤖 Configure Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null 2>&1 || true

      # ---------- 5. Generate release keystore ----------
      - name: 🔑 Generate release keystore
        env:
          KS_PASS: ${{ secrets.QTBM_KEYSTORE_PASSWORD }}
        run: |
          KS_PASS="${KS_PASS:-qtbm-ci-keystore-2026}"
          if [ ! -f android/app/qtbm-release.keystore ]; then
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore android/app/qtbm-release.keystore \
              -alias qtbm \
              -keyalg RSA -keysize 4096 \
              -sigalg SHA256withRSA \
              -validity 10950 \
              -storepass "$KS_PASS" \
              -keypass "$KS_PASS" \
              -dname "CN=QTBM CRYPTO, OU=Engineering, O=QTBM, L=Sanaa, ST=Sanaa, C=YE"
          fi
          printf 'storeFile=qtbm-release.keystore\nstorePassword=%s\nkeyAlias=qtbm\nkeyPassword=%s\n' \
            "$KS_PASS" "$KS_PASS" > android/keystore.properties

      # ---------- 6. Build the web app (static export) ----------
      - name: 🌐 Build Next.js (static export)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: ✅ Verify static export
        run: |
          if [ ! -f out/index.html ]; then
            echo "✗ Build failed: out/index.html not found"
            exit 1
          fi
          echo "✓ out/index.html exists ($(wc -c < out/index.html) bytes)"

      # ---------- 7. Capacitor sync ----------
      - name: 🔄 Capacitor sync
        run: bun run cap:sync

      - name: 📁 Ensure cordova-plugins directory
        run: mkdir -p android/capacitor-cordova-android-plugins/src/main/libs

      # ---------- 8. Build the APK ----------
      - name: 📱 Build ${{ github.event.inputs.build_type || 'release' }} APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          cd android
          chmod +x ./gradlew || true
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          fi
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --console=plain --stacktrace
          else
            ./gradlew assembleRelease --no-daemon --console=plain --stacktrace
          fi

      # ---------- 9. Locate & verify APK ----------
      - name: 📂 Locate built APK
        id: apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_GLOB="android/app/build/outputs/apk/debug/*.apk"
          else
            APK_GLOB="android/app/build/outputs/apk/release/*.apk"
          fi
          APK_PATH=$(ls -1 $APK_GLOB 2>/dev/null | head -1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "✗ No APK found at $APK_GLOB" >&2
            exit 1
          fi
          APK_ABS="$(pwd)/$APK_PATH"
          APK_NAME=$(basename "$APK_ABS")
          APK_SIZE=$(du -h "$APK_ABS" | cut -f1)
          echo "apk_path=$APK_ABS" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✓ Built APK: $APK_NAME ($APK_SIZE)"

      # ---------- 10. Upload artifact ----------
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QTBM-CRYPTO-${{ github.event.inputs.build_type || 'release' }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 90

      # ---------- 11. Create GitHub Release on tags ----------
      - name: 🏷 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          name: QTBM CRYPTO ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 12. Summary ----------
      - name: 📊 Build summary
        run: |
          echo "## ✅ QTBM CRYPTO APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Name | \`${{ steps.apk.outputs.apk_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | \`${{ steps.apk.outputs.apk_size }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | \`${{ github.event.inputs.build_type || 'release' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
