apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'

android {
    namespace "com.qtbm.crypto"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.qtbm.crypto"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files in this folder are not compressed by default.
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // =================================================================
    // SIGNING CONFIGURATION
    // =================================================================
    // For release builds, the keystore is read from keystore.properties
    // (which is .gitignored). Run `bun run keystore:generate` to create
    // a production keystore, or drop your own at android/qtbm-release.keystore
    // and provide keystore.properties next to this file.
    // -----------------------------------------------------------------
    def keystorePropertiesFile = rootProject.file("keystore.properties")
    def keystoreProperties = new Properties()
    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            } else {
                // Fallback to debug signing if no release keystore is configured.
                // Useful for first-time CI runs; release builds should always
                // configure a proper keystore via `bun run keystore:generate`.
                storeFile file("debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            android.enableR8.fullMode = false
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            // Output APK with a friendly name
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    def appName = "QTBM-CRYPTO"
                    def version = variant.versionName
                    outputFileName = "${appName}-v${version}.apk"
                }
            }
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')

    // Firebase Cloud Messaging (push notifications)
    implementation platform('com.google.firebase:firebase-bom:33.4.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

// Apply Capacitor plugin build config if present (auto-generated by `cap sync`).
// Wrap in a try/catch so the project still builds if the file is missing.
try {
    apply from: 'capacitor.build.gradle'
} catch (Exception ignored) {
    logger.warn("capacitor.build.gradle not found — no Capacitor plugins will be linked.")
}

// Suppress warnings about google-services.json missing during pure web builds
try {
    def gsFile = file("google-services.json")
    if (!gsFile.exists()) {
        logger.warn("google-services.json not found at ${gsFile.absolutePath}. " +
                "Run `bun run cap:sync` after placing it, or Firebase features will be unavailable.")
    }
} catch (Exception ignored) {}
